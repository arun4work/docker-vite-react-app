name: CI/CD Pipeline
on:
  push:
    branches: [master]
  pull_request:
    branches: [master] # Runs when a PR is opened targeting master and catches error if any

# This sets the flag globally for the whole workflow to use Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm run test:run -- --reporter=github-actions
      
      # NEW STEP: The Production Build Check
      - name: Build Application
        run: npm run build
        env:
          # Ensure any required build-time env vars are present here
          NODE_ENV: production

  deploy:
    # Only deploy if it's a direct push/merge to master
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install and configure Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ secrets.KOYEB_GITHUB_TOKEN }}

      - name: Trigger Koyeb Redeploy
        run: koyeb service redeploy circular-ardys/docker-vite-react-app
      # - name: Install Koyeb CLI
      #   run: |
      #     curl https://app.koyeb.com/install.sh | sh
      #     echo "${HOME}/.koyeb/bin" >> $GITHUB_PATH 
      #     # Note: The install script path can vary, check logs if 'koyeb' isn't found.

      # - name: Trigger Koyeb Redeploy
